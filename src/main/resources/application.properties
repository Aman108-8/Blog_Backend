spring.application.name=blogBackend
server.port=9090

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/blog_app
spring.datasource.username=<DB_COnnection>
spring.datasource.password=<DB_PASSWORD>.

#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect	//this line is not nedded Hibernate now auto-detects MySQL dialect from JDBC URL.

#create, update, create-update, validate
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
project.image=images/

logging.level.org.springframework.security=DEBUG

